<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button [routerLink]="['/home']">
        <ion-icon slot="icon-only" name="home-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Liste des Cours</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="custom-content">
  <ion-list>
    <ion-item *ngFor="let cours of coursList">
      {{ cours }}
    </ion-item>
  </ion-list>
</ion-content>
