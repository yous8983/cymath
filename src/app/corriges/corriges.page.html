<ion-header>
  <ion-toolbar color="tertiary">
    <ion-buttons slot="start">
      <ion-button [routerLink]="['/home']">
        <ion-icon slot="icon-only" name="home-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Corrigés</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="custom-content">
  <ion-list>
    <ion-item *ngFor="let corrige of corrigesList">
      {{ corrige }}
    </ion-item>
  </ion-list>
</ion-content>
